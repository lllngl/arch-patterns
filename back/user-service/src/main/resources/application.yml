server:
  port: 9000
spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5430/user
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/internetbank

internal:
  api:
    key: uYuQ8lwlpZbVmZB4u8U8DWZJiLojIaGr

keycloak:
  server-url: http://localhost:8080
  realm: internetbank
  initial-temporary-password: ${KEYCLOAK_INITIAL_TEMPORARY_PASSWORD:string1}
  admin:
    client-id: user-service-admin
    client-secret: t0UIAM1iHI6iOQw25VW7C9FdU6DtLUkI

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.internetbank: DEBUG
    org.springframework.security: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.aop: TRACE
    org.springframework.expression: TRACE
