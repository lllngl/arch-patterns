services:
  db:
    container_name: account-db
    image: postgres:17
    hostname: account-db
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=account
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5435:5432"

volumes:
  db-data:



