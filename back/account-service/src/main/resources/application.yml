server:
  port: 9005
spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5435/account
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/internetbank}

internal:
  api:
    key: uYuQ8lwlpZbVmZB4u8U8DWZJiLojIaGr

bank:
  base-currency: RUB
  supported-currencies:
    - RUB
    - USD
    - EUR
  master-account-user-id: 00000000-0000-0000-0000-000000000001
  master-account-name: Bank master account
  commission-percent: 0.00

exchange-rate:
  base-url: https://api.frankfurter.dev/v1

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.internetbank: DEBUG

