server:
  port: 9005
spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5432/account
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss

internal:
  api:
    key: uYuQ8lwlpZbVmZB4u8U8DWZJiLojIaGr

jwt:
  secret: mp1CBLrNvOPkvNFMijS0l7YG3Un5vzq0ICBgg3z3PJQ=
  access-token-duration: PT2M    # 2 min
  refresh-token-duration: P7D    # 7 days
  refresh-token-replay-blacklist-duration: 15s

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.internetbank: DEBUG

