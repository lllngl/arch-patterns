server:
  port: 9005
spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5435/account
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      consumer:
        enable-auto-commit: false
        max-poll-records: 10
        properties:
          retry.backoff.ms: 1000
      listener:
        ack-mode: manual
      properties:
        spring.json.trusted.packages: "com.internetbank.account_service.messaging"
        spring.json.value.default.type: com.internetbank.account_service.messaging.AccountOperationCommand
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      properties:
        spring.json.add.type.headers: false
        retry.backoff.ms: 500
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/internetbank}

internal:
  api:
    key: uYuQ8lwlpZbVmZB4u8U8DWZJiLojIaGr

bank:
  base-currency: RUB
  supported-currencies:
    - RUB
    - USD
    - EUR
  master-account-user-id: 00000000-0000-0000-0000-000000000001
  master-account-name: Bank master account
  commission-percent: 0.00

exchange-rate:
  base-url: ${EXCHANGE_RATE_BASE_URL:https://open.er-api.com/v6/latest}

app:
  kafka:
    topics:
      account-operation-commands: account-operation-commands
    command-await-timeout-ms: 10000
    command-await-poll-interval-ms: 100
  websocket:
    endpoint: /ws
    account-transactions-destination-prefix: /topic/accounts

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.internetbank: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      kafka-producer:
        slidingWindowSize: 10
        failureRateThreshold: 70
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      kafka-producer:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - org.apache.kafka.common.errors.TimeoutException
          - org.springframework.kafka.core.KafkaProducerException
      kafka-consumer:
        maxAttempts: 3
        waitDuration: 1s
        retryExceptions:
          - org.springframework.dao.DataAccessException
          - java.sql.SQLException