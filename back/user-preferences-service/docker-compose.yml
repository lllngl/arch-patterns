services:
  db:
    container_name: user-preferences-db
    image: postgres:17
    hostname: user-preferences-db
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=user_preferences
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5438:5432"

volumes:
  db-data:
